<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project – TaskFlow</title>
  <meta name="description" content="Manage tasks and team members for this project on TaskFlow."/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div class="animated-bg"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/dashboard.html" class="navbar-brand">
      <div class="brand-icon">⚡</div>
      TaskFlow
    </a>
    <div class="navbar-user">
      <div class="user-info">
        <div class="user-name" id="nav-user-name">Loading…</div>
        <div class="user-role" id="nav-user-role"></div>
      </div>
      <div class="avatar" id="nav-avatar">?</div>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </nav>

  <main class="page-container">
    <!-- Back link + Project Header -->
    <a href="/dashboard.html" class="back-btn">← Back to Dashboard</a>

    <div class="project-header-card">
      <div class="project-header-top">
        <div>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <h1 id="project-title" style="font-size:1.75rem">Loading…</h1>
            <span id="project-role-badge"></span>
          </div>
          <p id="project-desc-text" style="color:var(--text-muted);margin-top:6px;font-size:0.9rem"></p>
        </div>
        <button class="btn btn-primary" id="new-task-btn">＋ New Task</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 280px;gap:1.5rem;align-items:start" id="main-layout">

      <!-- Kanban Board -->
      <section>
        <div class="section-header">
          <h2 class="section-title">📋 Task Board</h2>
        </div>
        <div class="kanban-board" id="kanban-board">
          <div class="loading-overlay" style="grid-column:1/-1"><span class="loader"></span></div>
        </div>
      </section>

      <!-- Team Members Sidebar -->
      <aside>
        <div class="section-header">
          <h2 class="section-title">👥 Team</h2>
          <button class="btn btn-secondary btn-sm" id="add-member-btn">＋ Add</button>
        </div>
        <div class="members-list" id="members-list">
          <div class="loading-overlay"><span class="loader"></span></div>
        </div>
      </aside>

    </div>
  </main>

  <!-- Task Modal -->
  <div class="modal-overlay hidden" id="task-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="task-modal-title">New Task</h3>
        <button class="modal-close" id="task-modal-close">✕</button>
      </div>
      <form id="task-form">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="task-title">Title *</label>
            <input class="form-control" type="text" id="task-title" placeholder="Task title" required/>
          </div>
          <div class="form-group">
            <label class="form-label" for="task-desc">Description</label>
            <textarea class="form-control" id="task-desc" rows="3" placeholder="Task details…"></textarea>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label class="form-label" for="task-due">Due Date</label>
              <input class="form-control" type="date" id="task-due"/>
            </div>
            <div class="form-group">
              <label class="form-label" for="task-priority">Priority</label>
              <select class="form-control" id="task-priority">
                <option value="LOW">Low</option>
                <option value="MEDIUM" selected>Medium</option>
                <option value="HIGH">High</option>
              </select>
            </div>
          </div>
          <div class="form-group" id="task-status-row" style="display:none">
            <label class="form-label" for="task-status">Status</label>
            <select class="form-control" id="task-status">
              <option value="TODO">To Do</option>
              <option value="IN_PROGRESS">In Progress</option>
              <option value="DONE">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="task-assignee">Assign To</label>
            <select class="form-control" id="task-assignee">
              <option value="">— Unassigned —</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" id="task-delete-btn" style="display:none;margin-right:auto">Delete</button>
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Member Modal -->
  <div class="modal-overlay hidden" id="member-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3>Add Team Member</h3>
        <button class="modal-close" id="member-modal-close">✕</button>
      </div>
      <form id="member-form">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="member-user-select">Select User</label>
            <select class="form-control" id="member-user-select">
              <option value="">Select user…</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="member-role-select">Role</label>
            <select class="form-control" id="member-role-select">
              <option value="MEMBER">Member</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeMemberModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Member</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/project.js"></script>

  <script>
    // Make layout responsive
    window.addEventListener('resize', () => {
      const layout = document.getElementById('main-layout');
      if (layout) {
        layout.style.gridTemplateColumns = window.innerWidth < 900 ? '1fr' : '1fr 280px';
      }
    });
    window.dispatchEvent(new Event('resize'));
  </script>
</body>
</html>
