<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – TaskFlow</title>
  <meta name="description" content="TaskFlow dashboard – view your task statistics and all projects at a glance."/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div class="animated-bg"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/dashboard.html" class="navbar-brand">
      <div class="brand-icon">⚡</div>
      TaskFlow
    </a>
    <div class="navbar-user">
      <div class="user-info">
        <div class="user-name" id="nav-user-name">Loading…</div>
        <div class="user-role" id="nav-user-role"></div>
      </div>
      <div class="avatar" id="nav-avatar">?</div>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </nav>

  <main class="page-container">
    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Overview of your tasks and projects</p>
      </div>
      <button class="btn btn-primary" id="new-project-btn">＋ New Project</button>
    </div>

    <!-- Stats Section -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">📊 My Task Overview</h2>
      </div>
      <div class="stats-grid">
        <div class="stat-card purple glass">
          <div class="stat-icon">📋</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card blue glass">
          <div class="stat-icon">🔵</div>
          <div class="stat-value" id="stat-todo">—</div>
          <div class="stat-label">To Do</div>
        </div>
        <div class="stat-card cyan glass">
          <div class="stat-icon">⚡</div>
          <div class="stat-value" id="stat-progress">—</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card green glass">
          <div class="stat-icon">✅</div>
          <div class="stat-value" id="stat-done">—</div>
          <div class="stat-label">Done</div>
        </div>
        <div class="stat-card red glass">
          <div class="stat-icon">⚠️</div>
          <div class="stat-value" id="stat-overdue">—</div>
          <div class="stat-label">Overdue</div>
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">📁 My Projects</h2>
      </div>
      <div class="projects-grid" id="projects-grid">
        <div class="loading-overlay"><span class="loader"></span></div>
      </div>
    </section>
  </main>

  <!-- New Project Modal -->
  <div class="modal-overlay hidden" id="project-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create New Project</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="project-form">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="proj-name">Project Name *</label>
            <input class="form-control" type="text" id="proj-name" placeholder="e.g. Website Redesign" required/>
          </div>
          <div class="form-group">
            <label class="form-label" for="proj-desc">Description</label>
            <textarea class="form-control" id="proj-desc" rows="3" placeholder="What is this project about?"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeProjectModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
