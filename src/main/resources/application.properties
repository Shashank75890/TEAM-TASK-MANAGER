spring.application.name=task-manager
server.port=${PORT:8083}

# Database — UPDATE the password below to match your MySQL root password
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Hibernate 6 auto-detects MySQL dialect — do NOT set it manually

# JWT
jwt.secret=${JWT_SECRET:myVerySecretKeyForJWTThatIsAtLeast256BitsLongForSecurity12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.taskmanager=INFO
